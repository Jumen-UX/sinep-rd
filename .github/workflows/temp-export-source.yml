name: Verify organization unit cutover

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write

jobs:
  verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.18.3

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify cutover
        id: check
        continue-on-error: true
        run: |
          set -o pipefail
          pnpm check 2>&1 | tee final-check.log

      - name: Commit failure report
        if: steps.check.outcome == 'failure'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add final-check.log
          git commit -m 'chore: organization unit final check log [skip ci]'
          git push
          exit 1

      - name: Commit verified cleanup
        if: steps.check.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          rm -f final-check.log cutover-check.log
          rm -f repo-source-export.zip repo-source-snapshot.zip
          rm -f legacy-pastoral-report.txt legacy-source-bundle.txt migration-index.txt
          rm -f tmp-cutover-trigger.txt tmp-placeholder.txt
          rm -f scripts/temp-remove-legacy-pastoral.py
          rm -f scripts/temp-align-security-contracts.py
          rm -f scripts/temp-complete-org-unit-migration.py
          rm -f .github/workflows/temp-export-source.yml
          rm -f .github/workflows/temp-source-snapshot.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix: completar corte a unidades organizativas [skip ci]'
          git push
          gh issue close 6 --reason completed --comment 'Corte verificado: guardia heredada, TypeScript, pruebas y build completados correctamente.' || true
