name: Temporary migration inventory

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  inventory:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Build index
        run: |
          {
            echo '# Migration files'
            echo
            find supabase/migrations -maxdepth 1 -type f -printf '%f\n' | sort
          } > migration-index.txt

      - name: Commit index
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add migration-index.txt
          git commit -m 'chore: temporary migration index [skip ci]'
          git push
