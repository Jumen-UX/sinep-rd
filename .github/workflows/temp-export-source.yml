name: Temporary legacy source bundle

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  bundle:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Build bundle
        run: |
          : > legacy-source-bundle.txt
          while IFS= read -r file; do
            printf '\n===== FILE: %s =====\n' "$file" >> legacy-source-bundle.txt
            cat "$file" >> legacy-source-bundle.txt
            printf '\n===== END FILE: %s =====\n' "$file" >> legacy-source-bundle.txt
          done < <(grep -RlE \
            --exclude-dir=.git \
            --exclude-dir=node_modules \
            --exclude-dir=.next \
            'pastoral_entity|PastoralEntity|pastoralEntities|public_pastoral_entities|pastoral_entities' \
            src tests 2>/dev/null | sort)

      - name: Commit bundle
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add legacy-source-bundle.txt
          git commit -m 'chore: temporary legacy source bundle [skip ci]'
          git push
