name: Temporary legacy inventory

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  inventory:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Build report
        run: |
          {
            echo '# Legacy pastoral references'
            echo
            grep -RInE \
              --exclude-dir=.git \
              --exclude-dir=node_modules \
              --exclude-dir=.next \
              --exclude='repo-source-export.zip' \
              'pastoral_entity|PastoralEntity|pastoralEntities|public_pastoral_entities|pastoral_entities' \
              src tests scripts package.json supabase/migrations 2>/dev/null || true
          } > legacy-pastoral-report.txt

      - name: Commit report
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add legacy-pastoral-report.txt
          git commit -m 'chore: temporary legacy pastoral inventory [skip ci]'
          git push
