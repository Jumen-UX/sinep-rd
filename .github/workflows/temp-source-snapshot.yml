name: Complete organization unit migration

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write

jobs:
  migrate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.18.3

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Complete migration
        run: python scripts/temp-complete-org-unit-migration.py

      - name: Write legacy guard
        run: |
          cat > scripts/check-no-legacy-pastoral.mjs <<'EOF'
          import { readdir, readFile } from 'node:fs/promises'
          import path from 'node:path'

          const roots = ['src', 'tests']
          const extensions = new Set(['.ts', '.tsx', '.js', '.jsx', '.mjs'])
          const patterns = [/pastoral_entity/i, /PastoralEntity/, /pastoralEntities/]
          const findings = []

          async function walk(directory) {
            const entries = await readdir(directory, { withFileTypes: true })
            for (const entry of entries) {
              const absolute = path.join(directory, entry.name)
              if (entry.isDirectory()) {
                await walk(absolute)
                continue
              }
              if (!extensions.has(path.extname(entry.name))) continue

              const content = await readFile(absolute, 'utf8')
              content.split(/\r?\n/).forEach((line, index) => {
                if (patterns.some((pattern) => pattern.test(line))) {
                  findings.push(`${absolute}:${index + 1}: ${line.trim()}`)
                }
              })
            }
          }

          for (const root of roots) await walk(root)

          if (findings.length > 0) {
            console.error('Se encontraron referencias al modelo pastoral heredado:')
            findings.forEach((finding) => console.error(`- ${finding}`))
            process.exit(1)
          }

          console.log('No se encontraron referencias al modelo pastoral heredado.')
          EOF

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify migration
        id: check
        continue-on-error: true
        run: |
          set -o pipefail
          pnpm check 2>&1 | tee migration-check.log

      - name: Report failure
        if: steps.check.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo 'La tercera corrección automática no superó pnpm check.'
            echo
            echo '```text'
            tail -c 50000 migration-check.log
            echo '```'
          } > migration-issue.md
          gh issue comment 6 --body-file migration-issue.md
          exit 1

      - name: Commit verified migration
        if: steps.check.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          rm -f repo-source-snapshot.zip tmp-placeholder.txt migration-check.log
          rm -f .github/workflows/temp-source-snapshot.yml
          rm -f scripts/temp-complete-org-unit-migration.py
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix: completar migración a unidades organizativas'
          git push
          gh issue close 6 --reason completed --comment 'La migración se verificó con check:legacy, typecheck, pruebas y build antes de integrarse en main.'
