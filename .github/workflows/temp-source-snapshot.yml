name: Complete organization unit migration

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write

jobs:
  migrate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.18.3

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Complete source migration
        run: python scripts/temp-complete-org-unit-migration.py

      - name: Align security contracts
        run: python scripts/temp-align-security-contracts.py

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify migration
        id: check
        continue-on-error: true
        run: |
          set -o pipefail
          pnpm check 2>&1 | tee migration-check.log

      - name: Report failure
        if: steps.check.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo 'La verificación de la migración a unidades organizativas no superó pnpm check.'
            echo
            echo '```text'
            tail -c 50000 migration-check.log
            echo '```'
          } > migration-issue.md
          gh issue comment 6 --body-file migration-issue.md
          exit 1

      - name: Commit verified migration
        if: steps.check.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          rm -f repo-source-snapshot.zip tmp-placeholder.txt migration-check.log
          rm -f .github/workflows/temp-source-snapshot.yml
          rm -f scripts/temp-complete-org-unit-migration.py
          rm -f scripts/temp-align-security-contracts.py
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix: completar migración a unidades organizativas'
          git push
          gh issue close 6 --reason completed --comment 'La migración se verificó con check:legacy, typecheck, pruebas y build antes de integrarse en main.'
