name: One-time priest CodeQL remediation

on:
  push:
    paths:
      - '.github/workflows/one-time-priest-codeql-fix.yml'

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Replace unsafe success rendering
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/features/clero/priest/admin/PriestWizardPage.tsx')
          text = path.read_text(encoding='utf-8')

          old_import = "import { type FormEvent, useEffect, useMemo, useState } from 'react'"
          new_import = "import { type FormEvent, useEffect, useMemo, useRef, useState } from 'react'"
          if text.count(old_import) != 1:
              raise SystemExit('No se encontró exactamente una importación de React para actualizar.')
          text = text.replace(old_import, new_import, 1)

          anchor = """function buildDisplayName(parts: Array<FormDataEntryValue | string | null | undefined>) {
            return parts.map((part) => String(part ?? '').trim()).filter(Boolean).join(' ')
          }
          """

          component = """

          type PriestSaveSuccessNoticeProps = {
            message: string
            internalCode: string | null
            personId: string | null
            slug: string | null
          }

          function PriestSaveSuccessNotice({ message, internalCode, personId, slug }: PriestSaveSuccessNoticeProps) {
            const messageRef = useRef<HTMLElement>(null)
            const internalCodeRef = useRef<HTMLSpanElement>(null)
            const adminHref = personId ? `/admin/personas/${encodeURIComponent(personId)}` : null
            const publicHref = slug ? `/personas/${encodeURIComponent(slug)}` : null

            useEffect(() => {
              if (messageRef.current) messageRef.current.textContent = message
              if (internalCodeRef.current) {
                internalCodeRef.current.textContent = internalCode ? `Código interno: ${internalCode}` : ''
              }
            }, [internalCode, message])

            return (
              <section className="success-box admin-wizard-success">
                <div>
                  <strong ref={messageRef} />
                  <span hidden={!internalCode} ref={internalCodeRef} />
                </div>
                <div className="admin-actions">
                  {adminHref && <Link className="button button-primary" href={adminHref}>Abrir ficha administrativa</Link>}
                  {publicHref && <Link className="button button-secondary" href={publicHref}>Ver ficha pública</Link>}
                </div>
              </section>
            )
          }
          """

          if text.count(anchor) != 1:
              raise SystemExit('No se encontró exactamente un punto de inserción para el componente seguro.')
          text = text.replace(anchor, anchor + component, 1)

          old_success = """      {message && <section className="success-box admin-wizard-success"><div><strong>{message}</strong>{savedInternalCode && <span>Código interno: {savedInternalCode}</span>}</div><div className="admin-actions">{savedPersonId && <Link className="button button-primary" href={`/admin/personas/${savedPersonId}`}>Abrir ficha administrativa</Link>}{savedSlug && <Link className="button button-secondary" href={`/personas/${savedSlug}`}>Ver ficha pública</Link>}</div></section>}
          """

          new_success = """      {message && (
                <PriestSaveSuccessNotice
                  internalCode={savedInternalCode}
                  message={message}
                  personId={savedPersonId}
                  slug={savedSlug}
                />
              )}
          """

          if text.count(old_success) != 1:
              raise SystemExit('No se encontró exactamente el bloque de éxito vulnerable.')
          text = text.replace(old_success, new_success, 1)
          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit remediation
        shell: bash
        run: |
          if git diff --quiet; then
            echo 'No hay cambios que confirmar.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/features/clero/priest/admin/PriestWizardPage.tsx
          git commit -m 'fix(security): avoid DOM-to-HTML flow in priest success notice'
          git push origin HEAD:main
