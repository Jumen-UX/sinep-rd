name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-residuals:
    if: github.event_name == 'pull_request' && github.head_ref == 'phase2-canonical-organization-units'
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.patch.outputs.changed }}
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Remove residual legacy references
        id: patch
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          changes = 0
          replacements = {
              Path('src/lib/admin/scopeUtils.ts'): [
                  ("pastoral_entity: 'Entidad Pastoral'", "organization_unit: 'Unidad organizativa'"),
              ],
              Path('tests/review-security-contracts.test.mjs'): [
                  ('/pastoral_entity/', '/organization_unit/'),
              ],
          }

          for path, pairs in replacements.items():
              text = path.read_text(encoding='utf-8')
              updated = text
              for old, new in pairs:
                  updated = updated.replace(old, new)
              if updated != text:
                  path.write_text(updated, encoding='utf-8')
                  changes += 1

          Path('/tmp/patch-changed').write_text('true' if changes else 'false', encoding='utf-8')
          PY
          echo "changed=$(cat /tmp/patch-changed)" >> "$GITHUB_OUTPUT"

      - name: Commit residual cleanup
        if: steps.patch.outputs.changed == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/lib/admin/scopeUtils.ts tests/review-security-contracts.test.mjs
          git commit -m "refactor: remove final pastoral entity references"
          git push origin HEAD:${{ github.head_ref }}

  typecheck-and-build:
    needs: patch-residuals
    if: always() && (needs.patch-residuals.result == 'skipped' || needs.patch-residuals.outputs.changed != 'true')
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ci-placeholder-anon-key
      APP_BASE_URL: http://localhost:3000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.18.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check
        shell: bash
        run: |
          set -o pipefail
          pnpm check 2>&1 | tee check-report.txt

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-report
          path: check-report.txt
