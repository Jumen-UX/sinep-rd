name: CI

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      base_url:
        description: URL pÃºblica para ejecutar Playwright y Axe (opcional)
        required: false
        type: string
  schedule:
    - cron: '17 9 * * 1'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Typecheck, tests and build
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ci-placeholder-anon-key
      APP_BASE_URL: http://localhost:3000
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.18.3

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check
        run: pnpm check

  dependency-audit:
    name: Critical dependency audit
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.18.3

      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level=critical

  codeql:
    name: CodeQL JavaScript and TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript

      - name: Analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:javascript-typescript

  production-e2e:
    name: Production Playwright and Axe
    if: github.event_name == 'workflow_dispatch' && inputs.base_url != ''
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      E2E_BASE_URL: ${{ inputs.base_url }}
      E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
      E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
      E2E_ACCESS_PROFILES_JSON: ${{ secrets.E2E_ACCESS_PROFILES_JSON }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.18.3

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install Chromium
        run: pnpm test:e2e:install

      - name: Test public routes and accessibility
        run: pnpm test:e2e:public

      - name: Test admin import when credentials exist
        shell: bash
        run: |
          if [[ -z "${E2E_ADMIN_EMAIL}" || -z "${E2E_ADMIN_PASSWORD}" ]]; then
            echo "Admin E2E skipped: configure E2E_ADMIN_EMAIL and E2E_ADMIN_PASSWORD as repository secrets."
            exit 0
          fi
          pnpm test:e2e:admin

      - name: Test administrative access matrix when configured
        shell: bash
        run: |
          if [[ -z "${E2E_ACCESS_PROFILES_JSON}" ]]; then
            echo "Access matrix E2E skipped: configure E2E_ACCESS_PROFILES_JSON as a repository secret."
            exit 0
          fi
          pnpm test:e2e:access

      - name: Upload Playwright diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 14

