name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-migrations:
    if: github.event_name == 'pull_request' && github.head_ref == 'phase2-canonical-organization-units'
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.patch.outputs.changed }}
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Make cutover migrations idempotent
        id: patch
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          scope_path = Path('supabase/migrations/20260714020000_canonicalize_organization_unit_scope_and_audit.sql')
          scope = scope_path.read_text(encoding='utf-8')
          old = """update public.user_role_assignments
set organization_unit_id = coalesce(organization_unit_id, pastoral_entity_id),
    scope_type = case when scope_type = 'pastoral_entity' then 'organization_unit' else scope_type end
where pastoral_entity_id is not null or scope_type = 'pastoral_entity';

update public.audit_logs
set organization_unit_id = coalesce(organization_unit_id, pastoral_entity_id),
    scope_type = case when scope_type = 'pastoral_entity' then 'organization_unit' else scope_type end
where pastoral_entity_id is not null or scope_type = 'pastoral_entity';

update public.change_requests
set organization_unit_id = coalesce(organization_unit_id, pastoral_entity_id),
    scope_type = case when scope_type = 'pastoral_entity' then 'organization_unit' else scope_type end
where pastoral_entity_id is not null or scope_type = 'pastoral_entity';
"""
          new = """do $migration$
begin
  if exists (
    select 1 from information_schema.columns
    where table_schema='public' and table_name='user_role_assignments' and column_name='pastoral_entity_id'
  ) then
    execute $sql$
      update public.user_role_assignments
      set organization_unit_id = coalesce(organization_unit_id, pastoral_entity_id),
          scope_type = case when scope_type = 'pastoral_entity' then 'organization_unit' else scope_type end
      where pastoral_entity_id is not null or scope_type = 'pastoral_entity'
    $sql$;
  end if;

  if exists (
    select 1 from information_schema.columns
    where table_schema='public' and table_name='audit_logs' and column_name='pastoral_entity_id'
  ) then
    execute $sql$
      update public.audit_logs
      set organization_unit_id = coalesce(organization_unit_id, pastoral_entity_id),
          scope_type = case when scope_type = 'pastoral_entity' then 'organization_unit' else scope_type end
      where pastoral_entity_id is not null or scope_type = 'pastoral_entity'
    $sql$;
  end if;

  if exists (
    select 1 from information_schema.columns
    where table_schema='public' and table_name='change_requests' and column_name='pastoral_entity_id'
  ) then
    execute $sql$
      update public.change_requests
      set organization_unit_id = coalesce(organization_unit_id, pastoral_entity_id),
          scope_type = case when scope_type = 'pastoral_entity' then 'organization_unit' else scope_type end
      where pastoral_entity_id is not null or scope_type = 'pastoral_entity'
    $sql$;
  end if;
end;
$migration$;
"""
          scope_updated = scope.replace(old, new)
          if scope_updated == scope:
            raise SystemExit('No se encontró el bloque de copia de alcances')
          scope_path.write_text(scope_updated, encoding='utf-8')

          remove_path = Path('supabase/migrations/20260714021000_remove_legacy_pastoral_model.sql')
          remove = remove_path.read_text(encoding='utf-8')
          replacements = [
            ('alter table public.appointments drop column pastoral_entity_id;', 'alter table public.appointments drop column if exists pastoral_entity_id;'),
            ('alter table public.audit_logs drop column pastoral_entity_id;', 'alter table public.audit_logs drop column if exists pastoral_entity_id;'),
            ('alter table public.change_requests drop column pastoral_entity_id;', 'alter table public.change_requests drop column if exists pastoral_entity_id;'),
            ('alter table public.commemorative_events drop column related_pastoral_entity_id;', 'alter table public.commemorative_events drop column if exists related_pastoral_entity_id;'),
            ('alter table public.documents drop column related_pastoral_entity_id;', 'alter table public.documents drop column if exists related_pastoral_entity_id;'),
            ('alter table public.event_occurrences drop column related_pastoral_entity_id;', 'alter table public.event_occurrences drop column if exists related_pastoral_entity_id;'),
            ('alter table public.event_reminders drop column pastoral_entity_id;', 'alter table public.event_reminders drop column if exists pastoral_entity_id;'),
            ('alter table public.movements drop column pastoral_entity_id;', 'alter table public.movements drop column if exists pastoral_entity_id;'),
            ('alter table public.organization_units drop column pastoral_entity_id;', 'alter table public.organization_units drop column if exists pastoral_entity_id;'),
            ('alter table public.position_assignments drop column pastoral_entity_id;', 'alter table public.position_assignments drop column if exists pastoral_entity_id;'),
            ('alter table public.structure_nodes drop column linked_pastoral_entity_id;', 'alter table public.structure_nodes drop column if exists linked_pastoral_entity_id;'),
            ('alter table public.user_role_assignments drop column pastoral_entity_id;', 'alter table public.user_role_assignments drop column if exists pastoral_entity_id;'),
            ('drop table public.pastoral_entities;', 'drop table if exists public.pastoral_entities;'),
          ]
          updated = remove
          for old_line, new_line in replacements:
            updated = updated.replace(old_line, new_line)
          if updated == remove:
            raise SystemExit('No se encontraron eliminaciones para endurecer')
          remove_path.write_text(updated, encoding='utf-8')
          PY
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit migration hardening
        if: steps.patch.outputs.changed == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add supabase/migrations/20260714020000_canonicalize_organization_unit_scope_and_audit.sql supabase/migrations/20260714021000_remove_legacy_pastoral_model.sql
          git commit -m "fix: make organization unit cutover idempotent"
          git push origin HEAD:${{ github.head_ref }}

  typecheck-and-build:
    needs: patch-migrations
    if: always() && (needs.patch-migrations.result == 'skipped' || needs.patch-migrations.outputs.changed != 'true')
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ci-placeholder-anon-key
      APP_BASE_URL: http://localhost:3000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.18.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check
        run: pnpm check
