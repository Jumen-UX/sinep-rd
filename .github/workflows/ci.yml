name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-migrations:
    if: github.event_name == 'pull_request' && github.head_ref == 'phase2-canonical-organization-units'
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.patch.outputs.changed }}
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Make cutover migrations idempotent
        id: patch
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          scope_path = Path('supabase/migrations/20260714020000_canonicalize_organization_unit_scope_and_audit.sql')
          scope = scope_path.read_text(encoding='utf-8')
          old = """update public.user_role_assignments
set organization_unit_id = coalesce(organization_unit_id, pastoral_entity_id),
    scope_type = case when scope_type = 'pastoral_entity' then 'organization_unit' else scope_type end
where pastoral_entity_id is not null or scope_type = 'pastoral_entity';

update public.audit_logs
set organization_unit_id = coalesce(organization_unit_id, pastoral_entity_id),
    scope_type = case when scope_type = 'pastoral_entity' then 'organization_unit' else scope_type end
where pastoral_entity_id is not null or scope_type = 'pastoral_entity';

update public.change_requests
set organization_unit_id = coalesce(organization_unit_id, pastoral_entity_id),
    scope_type = case when scope_type = 'pastoral_entity' then 'organization_unit' else scope_type end
where pastoral_entity_id is not null or scope_type = 'pastoral_entity';
"""
          new = """do $migration$
begin
  if exists (
    select 1 from information_schema.columns
    where table_schema='public' and table_name='user_role_assignments' and column_name='pastoral_entity_id'
  ) then
    execute $sql$
      update public.user_role_assignments
      set organization_unit_id = coalesce(organization_unit_id, pastoral_entity_id),
          scope_type = case when scope_type = 'pastoral_entity' then 'organization_unit' else scope_type end
      where pastoral_entity_id is not null or scope_type = 'pastoral_entity'
    $sql$;
  end if;

  if exists (
    select 1 from information_schema.columns
    where table_schema='public' and table_name='audit_logs' and column_name='pastoral_entity_id'
  ) then
    execute $sql$
      update public.audit_logs
      set organization_unit_id = coalesce(organization_unit_id, pastoral_entity_id),
          scope_type = case when scope_type = 'pastoral_entity' then 'organization_unit' else scope_type end
      where pastoral_entity_id is not null or scope_type = 'pastoral_entity'
    $sql$;
  end if;

  if exists (
    select 1 from information_schema.columns
    where table_schema='public' and table_name='change_requests' and column_name='pastoral_entity_id'
  ) then
    execute $sql$
      update public.change_requests
      set organization_unit_id = coalesce(organization_unit_id, pastoral_entity_id),
          scope_type = case when scope_type = 'pastoral_entity' then 'organization_unit' else scope_type end
      where pastoral_entity_id is not null or scope_type = 'pastoral_entity'
    $sql$;
  end if;
end;
$migration$;
"""
          scope_updated = scope.replace(old, new)
          if scope_updated == scope:
              raise SystemExit('No se encontró el bloque de copia de alcances')
          scope_path.write_text(scope_updated, encoding='utf-8')

          remove_path = Path('supabase/migrations/20260714021000_remove_legacy_pastoral_model.sql')
          remove = remove_path.read_text(encoding='utf-8')
          for table, column in [
              ('appointments','pastoral_entity_id'),
              ('audit_logs','pastoral_entity_id'),
              ('change_requests','pastoral_entity_id'),
              ('commemorative_events','related_pastoral_entity_id'),
              ('documents','related_pastoral_entity_id'),
              ('event_occurrences','related_pastoral_entity_id'),
              ('event_reminders','pastoral_entity_id'),
              ('movements','pastoral_entity_id'),
              ('organization_units','pastoral_entity_id'),
              ('position_assignments','pastoral_entity_id'),
              ('structure_nodes','linked_pastoral_entity_id'),
              ('user_role_assignments','pastoral_entity_id'),
          ]:
              remove = remove.replace(
                  f'alter table public.{table} drop column {column};',
                  f'alter table public.{table} drop column if exists {column};',
              )
          remove = remove.replace(
              'drop table public.pastoral_entities;',
              'drop table if exists public.pastoral_entities;',
          )
          remove_path.write_text(remove, encoding='utf-8')

          Path('/tmp/patch-changed').write_text('true', encoding='utf-8')
          PY
          echo "changed=$(cat /tmp/patch-changed)" >> "$GITHUB_OUTPUT"

      - name: Commit migration hardening
        if: steps.patch.outputs.changed == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add supabase/migrations/20260714020000_canonicalize_organization_unit_scope_and_audit.sql supabase/migrations/20260714021000_remove_legacy_pastoral_model.sql
          git commit -m "fix: make organization unit cutover idempotent"
          git push origin HEAD:${{ github.head_ref }}

  typecheck-and-build:
    needs: patch-migrations
    if: always() && (needs.patch-migrations.result == 'skipped' || needs.patch-migrations.outputs.changed != 'true')
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ci-placeholder-anon-key
      APP_BASE_URL: http://localhost:3000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.18.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check
        run: pnpm check
