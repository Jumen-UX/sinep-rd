name: Canonicalize organization units

on:
  push:
    branches:
      - phase2-canonical-organization-units

permissions:
  contents: write

jobs:
  canonicalize:
    if: ${{ !contains(github.event.head_commit.message, '[skip canonicalize]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Rewrite source contracts
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path
          import json
          import re

          replacements = [
              ('related_pastoral_entity_id', 'related_organization_unit_id'),
              ('linked_pastoral_entity_id', 'linked_organization_unit_id'),
              ('current_pastoral_entity_id', 'current_organization_unit_id'),
              ('current_pastoral_entity_name', 'current_organization_unit_name'),
              ('pastoral_entity_name', 'organization_unit_name'),
              ('pastoral_entity_slug', 'organization_unit_slug'),
              ('pastoral_entity_id', 'organization_unit_id'),
              ('pastoral_entities', 'organization_units'),
              ('pastoral_entity', 'organization_unit'),
              ('PastoralEntities', 'OrganizationUnits'),
              ('PastoralEntity', 'OrganizationUnit'),
              ('pastoralEntities', 'organizationUnits'),
          ]

          extensions = {'.ts', '.tsx', '.js', '.jsx', '.mjs', '.json'}
          for path in Path('src').rglob('*'):
              if not path.is_file() or path.suffix not in extensions:
                  continue
              text = path.read_text(encoding='utf-8')
              updated = text
              for old, new in replacements:
                  updated = updated.replace(old, new)
              if updated != text:
                  path.write_text(updated, encoding='utf-8')

          service_path = Path('src/features/appointments/services/assignment-admin-service.ts')
          service = service_path.read_text(encoding='utf-8')
          service = re.sub(r'\nexport type AssignmentOrganizationUnit = \{.*?\}\n', '\n', service, flags=re.S)
          service = service.replace('  organizationUnits: AssignmentOrganizationUnit[]\n', '')
          service = service.replace(
              'const [peopleResult, configResult, chartResult, unitResult, pastoralResult, assignmentResult, rawAssignmentResult] = await Promise.all([',
              'const [peopleResult, configResult, chartResult, unitResult, assignmentResult, rawAssignmentResult] = await Promise.all([',
          )
          service = service.replace("    supabase.from('organization_units').select('id,name,slug').eq('status', 'active').order('name'),\n", '')
          service = service.replace('    ?? pastoralResult.error\n', '')
          service = service.replace('    organizationUnits: (pastoralResult.data ?? []) as AssignmentOrganizationUnit[],\n', '')
          service_path.write_text(service, encoding='utf-8')

          manager_path = Path('src/features/appointments/admin/AssignmentManagerPage.tsx')
          manager = manager_path.read_text(encoding='utf-8')
          manager = manager.replace('  organizationUnits: [],\n', '')
          manager = manager.replace(
              "      ecclesiastical_entity_id: selectedEntityId || null,\n      organization_unit_id: emptyToNull(form.get('organization_unit_id')),\n",
              "      ecclesiastical_entity_id: selectedEntityId || null,\n",
          )
          manager = re.sub(
              r'\n\s*<select name="organization_unit_id" defaultValue="">\n\s*<option value="">Entidad pastoral</option>\n\s*\{catalogs\.organizationUnits\.map\(.*?\}\n\s*</select>\n',
              '\n',
              manager,
              flags=re.S,
          )
          manager_path.write_text(manager, encoding='utf-8')

          scope_path = Path('src/lib/admin/scopeUtils.ts')
          scope = scope_path.read_text(encoding='utf-8')
          old_block = """    if (assignments.scope_entity_id) {
      const { data: entity } = await supabase
        .from('ecclesiastical_entities')
        .select('name')
        .eq('id', assignments.scope_entity_id)
        .single()

      scopeName = entity?.name || null
    }
"""
          new_block = """    if (assignments.scope_entity_id) {
      if (assignments.scope_type === 'organization_unit') {
        const { data: unit } = await supabase
          .from('organization_units')
          .select('name')
          .eq('id', assignments.scope_entity_id)
          .single()
        scopeName = unit?.name || null
      } else {
        const { data: entity } = await supabase
          .from('ecclesiastical_entities')
          .select('name')
          .eq('id', assignments.scope_entity_id)
          .single()
        scopeName = entity?.name || null
      }
    }
"""
          scope = scope.replace(old_block, new_block)
          scope = scope.replace("organization_unit: 'Entidad Pastoral'", "organization_unit: 'Unidad organizativa'")
          scope_path.write_text(scope, encoding='utf-8')

          users_path = Path('src/app/(admin)/admin/usuarios/page.tsx')
          users = users_path.read_text(encoding='utf-8')
          users = users.replace("{ value: 'organization_unit', label: 'Entidad pastoral' }", "{ value: 'organization_unit', label: 'Unidad organizativa' }")
          users = users.replace('nodo de estructura o entidad pastoral real', 'nodo de estructura o unidad organizativa')
          users_path.write_text(users, encoding='utf-8')

          for path in Path('src').rglob('*'):
              if not path.is_file() or path.suffix not in extensions:
                  continue
              lines = path.read_text(encoding='utf-8').splitlines()
              deduped = []
              for line in lines:
                  if line.strip() and deduped and line == deduped[-1]:
                      continue
                  deduped.append(line)
              path.write_text('\n'.join(deduped) + '\n', encoding='utf-8')

          audit_script = Path('scripts/check-no-legacy-pastoral.mjs')
          audit_script.write_text("""import { readdir, readFile } from 'node:fs/promises'
import { extname, join, relative } from 'node:path'

const roots = ['src', 'tests']
const extensions = new Set(['.ts', '.tsx', '.js', '.jsx', '.mjs', '.json'])
const patterns = [/pastoral_entity/i, /pastoralentit/i]
const findings = []

async function walk(root, directory) {
  let entries
  try {
    entries = await readdir(directory, { withFileTypes: true })
  } catch (error) {
    if (error && error.code === 'ENOENT') return
    throw error
  }

  for (const entry of entries) {
    const path = join(directory, entry.name)
    if (entry.isDirectory()) {
      await walk(root, path)
      continue
    }
    if (!extensions.has(extname(entry.name))) continue
    const lines = (await readFile(path, 'utf8')).split(/\\r?\\n/)
    lines.forEach((line, index) => {
      if (patterns.some((pattern) => pattern.test(line))) {
        findings.push(`${relative(process.cwd(), path)}:${index + 1}: ${line.trim()}`)
      }
    })
  }
}

for (const root of roots) await walk(root, root)

if (findings.length > 0) {
  console.error('Se encontraron referencias al modelo pastoral heredado:')
  findings.forEach((finding) => console.error(`- ${finding}`))
  process.exit(1)
}

console.log('Sin referencias al modelo pastoral heredado en código activo.')
""", encoding='utf-8')

          package_path = Path('package.json')
          package = json.loads(package_path.read_text(encoding='utf-8'))
          scripts = package['scripts']
          scripts['check:legacy'] = 'node scripts/check-no-legacy-pastoral.mjs'
          scripts['check'] = 'pnpm check:legacy && pnpm typecheck && pnpm test && pnpm build'
          package_path.write_text(json.dumps(package, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')

          Path('.github/workflows/canonicalize-organization-units.yml').unlink()
          PY

      - uses: pnpm/action-setup@v4
        with:
          version: 10.18.3

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm check:legacy
      - run: pnpm typecheck

      - name: Commit canonicalization
        if: always()
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "refactor: canonicalize organization unit references [skip canonicalize]"
          git push origin HEAD:phase2-canonical-organization-units
