name: E2E / Public accessibility

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/e2e-public.yml'
      - 'e2e/**'
      - 'playwright.config.mjs'
      - 'src/app/(public)/**'
      - 'src/features/public/**'
      - 'src/lib/public/**'
      - 'src/app/globals.css'

permissions:
  contents: read

concurrency:
  group: e2e-public-${{ github.ref }}
  cancel-in-progress: true

jobs:
  accessibility:
    name: Chromium + Axe
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      CI: 'true'
      NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL || 'https://hrvgpceqaxujlttpimdz.supabase.co' }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY || 'sb_publishable_RJkFs3kYh4BoAzfGivOlvg_xBCEklGP' }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'sb_publishable_RJkFs3kYh4BoAzfGivOlvg_xBCEklGP' }}
      APP_BASE_URL: http://127.0.0.1:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.18.3

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install E2E runtime
        run: pnpm add --save-dev --lockfile=false @playwright/test@1.61.0 @axe-core/playwright@4.10.2

      - name: Install Chromium
        run: pnpm exec playwright install chromium --with-deps

      - name: Run public accessibility suite
        run: pnpm exec playwright test e2e/public-accessibility.spec.mjs

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-public-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 7
